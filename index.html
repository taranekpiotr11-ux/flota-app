<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Flota">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>🚗 Flota Firmowa</title>

<script>
// AUTO-CLEANUP starych SW/caches przy zmianie wersji
(function () {
  var APP_VERSION = 'v5';
  var stored = null;
  try { stored = localStorage.getItem('flota_app_ver'); } catch (e) {}
  var forceReset = new URLSearchParams(location.search).get('reset') === '1';
  if (stored === APP_VERSION && !forceReset) return;

  document.documentElement.innerHTML =
    '<body style="background:#0d1117;color:#fff;font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;text-align:center;padding:20px">' +
    '<div><div style="font-size:48px">🔄</div>' +
    '<div style="font-size:18px;font-weight:700;margin-top:16px">Aktualizuję apkę...</div></div></body>';

  var tasks = [];
  if ('serviceWorker' in navigator) {
    tasks.push(navigator.serviceWorker.getRegistrations()
      .then(function (rs) { return Promise.all(rs.map(function (r) { return r.unregister(); })); })
      .catch(function () {}));
  }
  if ('caches' in window) {
    tasks.push(caches.keys()
      .then(function (ks) { return Promise.all(ks.map(function (k) { return caches.delete(k); })); })
      .catch(function () {}));
  }
  Promise.all(tasks).then(function () {
    try { localStorage.setItem('flota_app_ver', APP_VERSION); } catch (e) {}
    setTimeout(function () {
      if (forceReset) location.replace(location.pathname);
      else location.reload();
    }, 400);
  });
})();
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0d1117;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
iframe{position:fixed;inset:0;width:100%;height:100%;border:none;display:block;background:#0d1117}
#splash{position:fixed;inset:0;background:#0d1117;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;transition:opacity .5s}
#splash.hide{opacity:0;pointer-events:none}
#splash .icon{font-size:64px;animation:bounce 1.2s ease infinite}
#splash .title{color:#fff;font-size:22px;font-weight:900;margin-top:16px;letter-spacing:-0.5px}
#splash .sub{color:#4a9eff;font-size:12px;margin-top:6px;letter-spacing:2px;text-transform:uppercase}
#splash .bar{width:120px;height:3px;background:#1e2d4a;border-radius:3px;margin-top:24px;overflow:hidden}
#splash .bar::after{content:'';display:block;width:40%;height:100%;background:#4a9eff;border-radius:3px;animation:load 1.5s ease infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes load{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
</style>
</head>
<body>

<div id="splash">
  <div class="icon">🚗</div>
  <div class="title">Flota Firmowa</div>
  <div class="sub">Zarządzanie flotą</div>
  <div class="bar"></div>
</div>

<iframe id="app" allow="clipboard-write" style="display:none"></iframe>

<script>
(function () {
  var GAS_URL = 'https://script.google.com/macros/s/AKfycby9eO4N4dHyXsiZTYqiuy6FQZmCH3sZZcOQ9jItuqE8im7B4-lrSJVtOOFhXchrYu3rfg/exec';

  // Wykryj mobile (iOS, iPadOS, Android)
  var ua = navigator.userAgent || '';
  var isIPadOS = navigator.maxTouchPoints > 2 && /MacIntel/.test(navigator.platform || '');
  var isMobile = /iPhone|iPad|iPod|Android/i.test(ua) || isIPadOS;

  if (isMobile) {
    // Mobile: pomiń iframe, zrób bezpośredni redirect do GAS
    // iframe GAS jest blokowany przez ITP/cookies na iOS Safari i Chrome mobile
    setTimeout(function () {
      window.location.replace(GAS_URL);
    }, 700);
  } else {
    // Desktop: iframe (działa normalnie)
    var iframe = document.getElementById('app');
    var splash = document.getElementById('splash');
    iframe.style.display = 'block';
    iframe.src = GAS_URL;
    iframe.addEventListener('load', function () {
      setTimeout(function () { splash.classList.add('hide'); }, 400);
    });
    setTimeout(function () { splash.classList.add('hide'); }, 6000);
  }

  // Rejestracja SW (na obu — na mobile SW zostaje zarejestrowany przed redirectem,
  // więc przy następnym odpaleniu PWA start_url będzie mógł działać offline-ish)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js?v=5', {
      scope: '/flota-app/',
      updateViaCache: 'none'
    }).catch(function () {});
  }
})();
</script>
</body>
</html>
