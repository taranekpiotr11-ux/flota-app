<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Flota">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>🚗 Flota Firmowa</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0d1117}
iframe{width:100%;height:100%;border:none}
#splash{position:fixed;inset:0;background:#0d1117;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;transition:opacity .5s}
#splash.hide{opacity:0;pointer-events:none}
#splash .icon{font-size:64px;animation:bounce 1.2s ease infinite}
#splash .title{color:#fff;font-family:sans-serif;font-size:22px;font-weight:900;margin-top:16px;letter-spacing:-0.5px}
#splash .sub{color:#4a9eff;font-family:sans-serif;font-size:12px;margin-top:6px;letter-spacing:2px;text-transform:uppercase}
#splash .bar{width:120px;height:3px;background:#1e2d4a;border-radius:3px;margin-top:24px;overflow:hidden}
#splash .bar::after{content:'';display:block;width:40%;height:100%;background:#4a9eff;border-radius:3px;animation:load 1.5s ease infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes load{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
</style>
</head>
<body>
<div id="splash">
  <div class="icon">🚗</div>
  <div class="title">Flota Firmowa</div>
  <div class="sub">Zarządzanie flotą</div>
  <div class="bar"></div>
</div>
<iframe id="app" src="https://script.google.com/macros/s/AKfycby9eO4N4dHyXsiZTYqiuy6FQZmCH3sZZcOQ9jItuqE8im7B4-lrSJVtOOFhXchrYu3rfg/exec" allow="clipboard-write"></iframe>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getMessaging, getToken, onMessage } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js';
const firebaseConfig = {
  apiKey: "AIzaSyDafjY09SSZ3OPaKgFn4-eWn0PIcFHeypE",
  authDomain: "flota-app-492109-5eeda.firebaseapp.com",
  projectId: "flota-app-492109-5eeda",
  storageBucket: "flota-app-492109-5eeda.firebasestorage.app",
  messagingSenderId: "126238696647",
  appId: "1:126238696647:web:59b820476d8c3094c98ae2"
};
const VAPID_KEY = 'BMhITYHRj1Z1kcXuQXCu5hnM6WxWxX7OORl6sGS3pz_OzkshJqK1PCX7unY46i7mF2bmpRp_EBlDN6OSz5YyUms';
const GAS_URL = 'https://script.google.com/macros/s/AKfycby9eO4N4dHyXsiZTYqiuy6FQZmCH3sZZcOQ9jItuqE8im7B4-lrSJVtOOFhXchrYu3rfg/exec';
const app = initializeApp(firebaseConfig);
const messaging = getMessaging(app);
async function setupPush() {
  const sw = await navigator.serviceWorker.register('sw.js');
  const permission = await Notification.requestPermission();
  if (permission !== 'granted') return;
  const token = await getToken(messaging, {
    vapidKey: VAPID_KEY,
    serviceWorkerRegistration: sw
  });
  if (token) {
    await fetch(GAS_URL + '?action=saveToken&token=' + encodeURIComponent(token));
  }
}
onMessage(messaging, (payload) => {
  new Notification(payload.notification.title, {
    body: payload.notification.body,
    icon: '/icon-192.png'
  });
});
setupPush().catch(console.error);
const iframe = document.getElementById('app');
const splash = document.getElementById('splash');
iframe.addEventListener('load', () => { setTimeout(() => splash.classList.add('hide'), 800); });
setTimeout(() => splash.classList.add('hide'), 6000);
</script>
</body>
</html>
